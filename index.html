<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nameplate 3D</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0a0f;--surface:#111119;--raised:#181824;--border:#252536;
    --accent:#e8423f;--accent-dim:#e8423f44;--gold:#f0b744;--gold-dim:#f0b74433;
    --text:#cccce0;--muted:#5e5e78;--dim:#2a2a40;
    --mono:'DM Mono',monospace;--sans:'Outfit',sans-serif;
  }
  html,body{height:100%;overflow:hidden}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);display:flex;flex-direction:column}

  .topbar{
    display:flex;align-items:center;gap:12px;padding:10px 16px;
    background:var(--surface);border-bottom:1px solid var(--border);
    flex-shrink:0;z-index:20;flex-wrap:wrap;
  }
  .logo{font-family:var(--mono);font-weight:500;font-size:13px;color:var(--accent);
    letter-spacing:2px;text-transform:uppercase;white-space:nowrap;user-select:none}
  .logo span{color:var(--muted)}
  .sep{width:1px;height:24px;background:var(--border);flex-shrink:0}

  .name-input{
    flex:1;min-width:100px;padding:7px 12px;
    background:var(--bg);border:1px solid var(--border);border-radius:5px;
    color:var(--text);font-family:var(--sans);font-size:18px;font-weight:600;
    letter-spacing:.5px;outline:none;transition:border-color .15s;
  }
  .name-input:focus{border-color:var(--accent)}
  .name-input::placeholder{color:var(--muted);font-weight:300}

  select{
    padding:7px 8px;background:var(--bg);border:1px solid var(--border);
    border-radius:5px;color:var(--text);font-family:var(--mono);font-size:12px;
    outline:none;cursor:pointer;
  }

  .btn{
    padding:7px 16px;border:none;border-radius:5px;font-family:var(--sans);
    font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap;
  }
  .btn:active{transform:scale(.96)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{filter:brightness(1.15)}
  .btn-outline{background:transparent;color:var(--gold);border:1px solid var(--gold)}
  .btn-outline:hover{background:var(--gold);color:var(--bg)}
  .btn-outline:disabled{opacity:.25;pointer-events:none}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);font-size:11px;padding:6px 10px}
  .btn-ghost:hover{color:var(--text);border-color:var(--text)}
  .btn-ghost.active{color:var(--accent);border-color:var(--accent)}

  .adv-panel{
    background:var(--surface);border-bottom:1px solid var(--border);
    overflow:hidden;max-height:0;transition:max-height .3s ease;flex-shrink:0;
  }
  .adv-panel.open{max-height:220px}
  .adv-inner{display:flex;flex-wrap:wrap;gap:16px;padding:12px 16px;align-items:end}
  .ctrl{display:flex;flex-direction:column;gap:3px}
  .ctrl label{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px}
  .ctrl-row{display:flex;align-items:center;gap:6px}
  .ctrl-row input[type="range"]{width:80px;accent-color:var(--accent);cursor:pointer}
  .ctrl-val{font-family:var(--mono);font-size:12px;color:var(--gold);min-width:36px;text-align:right}
  .color-sw{width:24px;height:24px;border-radius:4px;border:1px solid var(--border);overflow:hidden;position:relative;cursor:pointer}
  .color-sw input[type="color"]{position:absolute;inset:-4px;width:calc(100% + 8px);height:calc(100% + 8px);border:none;cursor:pointer;padding:0}

  #viewport{flex:1;position:relative;cursor:grab;overflow:hidden;background:var(--bg)}
  #viewport:active{cursor:grabbing}
  #viewport canvas{display:block}

  .hud{
    position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
    padding:5px 12px;background:rgba(17,17,25,.8);border:1px solid var(--border);
    border-radius:4px;font-family:var(--mono);font-size:10px;color:var(--muted);
    pointer-events:none;backdrop-filter:blur(6px);white-space:nowrap;
  }
  .toast{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    padding:10px 20px;background:var(--raised);border:1px solid var(--accent);
    border-radius:6px;font-size:14px;color:var(--accent);
    font-family:var(--mono);pointer-events:none;
    opacity:0;transition:opacity .3s;z-index:30;
  }
  .toast.show{opacity:1}
  .dims{
    position:absolute;top:10px;right:12px;
    padding:5px 10px;background:rgba(17,17,25,.8);border:1px solid var(--border);
    border-radius:4px;font-family:var(--mono);font-size:10px;color:var(--muted);
    pointer-events:none;backdrop-filter:blur(6px);
  }
  .dims b{color:var(--gold)}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">NP<span>3D</span></div>
  <div class="sep"></div>
  <input class="name-input" type="text" id="inName" placeholder="Nombre..." value="Lukas" maxlength="15" spellcheck="false" autocomplete="off">
  <select id="inFont">
    <optgroup label="Script">
      <option value="pacifico">Pacifico</option>
      <option value="lobster">Lobster</option>
      <option value="greatvibes">Great Vibes</option>
      <option value="sacramento">Sacramento</option>
      <option value="dancing">Dancing Script</option>
      <option value="alexbrush">Alex Brush</option>
    </optgroup>
    <optgroup label="Bold">
      <option value="bebas">Bebas Neue</option>
      <option value="righteous">Righteous</option>
      <option value="oswald">Oswald</option>
    </optgroup>
    <optgroup label="Serif">
      <option value="playfair">Playfair Display</option>
      <option value="baskerville">Libre Baskerville</option>
    </optgroup>
    <optgroup label="Fun">
      <option value="marker">Permanent Marker</option>
      <option value="bangers">Bangers</option>
    </optgroup>
  </select>
  <button class="btn btn-primary" onclick="generate()">Generar</button>
  <button class="btn btn-outline" id="btnExport" onclick="exportSTL()" disabled>&#8595; ZIP</button>
  <div class="sep"></div>
  <button class="btn btn-ghost" id="btnAdv" onclick="toggleAdvanced()">Avanzado</button>
</div>

<div class="adv-panel" id="advPanel">
  <div class="adv-inner">
    <div class="ctrl">
      <label>Engaste %</label>
      <div class="ctrl-row">
        <input type="range" id="inEngaste" min="0" max="100" value="50" step="5">
        <span class="ctrl-val" id="valEngaste">50%</span>
      </div>
    </div>
    <div class="ctrl">
      <label>Ancho total (mm)</label>
      <div class="ctrl-row">
        <input type="range" id="inWidth" min="80" max="350" value="200" step="10">
        <span class="ctrl-val" id="valWidth">200</span>
      </div>
    </div>
    <div class="ctrl">
      <label>Grosor inicial (mm)</label>
      <div class="ctrl-row">
        <input type="range" id="inDepthA" min="3" max="20" value="8" step="1">
        <span class="ctrl-val" id="valDepthA">8</span>
      </div>
    </div>
    <div class="ctrl">
      <label>Grosor nombre (mm)</label>
      <div class="ctrl-row">
        <input type="range" id="inDepthB" min="2" max="15" value="5" step="1">
        <span class="ctrl-val" id="valDepthB">5</span>
      </div>
    </div>
    <div class="ctrl">
      <label>Ratio nombre</label>
      <div class="ctrl-row">
        <input type="range" id="inNameRatio" min="15" max="60" value="28" step="1">
        <span class="ctrl-val" id="valNameRatio">0.28</span>
      </div>
    </div>
    <div class="ctrl">
      <label>Posici&oacute;n Y</label>
      <select id="inYMode">
        <option value="centroid">Centroide</option>
        <option value="third">1/3 inferior</option>
      </select>
    </div>
    <div class="ctrl">
      <label>Color inicial</label>
      <div class="color-sw"><input type="color" id="inColA" value="#e8423f"></div>
    </div>
    <div class="ctrl">
      <label>Color nombre</label>
      <div class="color-sw"><input type="color" id="inColB" value="#f0b744"></div>
    </div>
  </div>
</div>

<div id="viewport">
  <div class="toast" id="toast">Cargando fuentes...</div>
  <div class="dims" id="dims"></div>
  <div class="hud">Arrastrar &#8594; rotar &#183; Scroll &#8594; zoom &#183; Shift+arrastrar &#8594; pan</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/opentype.js/1.3.4/opentype.min.js"></script>

// ─── Decode base64 to ArrayBuffer without fetch ─────────────
function b64ToArrayBuffer(b64str) {
  try {
    const binStr = atob(b64str);
    const len = binStr.length;
    const bytes = new Uint8Array(len);
    for (let i = 0; i < len; i++) {
      bytes[i] = binStr.charCodeAt(i);
    }
    return bytes.buffer;
  } catch (e) {
    console.error('Failed to decode base64 font data:', e);
    throw new Error('Corrupt font data');
  }
}

const fonts = {};
let scene, camera, renderer;
let meshA = null, meshB = null, groupAll = null;
// Stored for pocket generation during export
var lastNameShapes = null, lastNamePos = null, lastCfg = null;
let orbitTheta = Math.PI * 1.2, orbitPhi = Math.PI * 0.32, orbitDist = 350;
const panOff = new THREE.Vector3();
let dragging = false, shiftHeld = false, prevPtr = { x:0, y:0 }, pinchDist = 0;
const vp = () => document.getElementById('viewport');

(async () => {
  initScene(); initControls(); bindUI(); animate();
  await loadFonts();
  generate();
})();

async function loadFonts() {
  showToast('Cargando fuentes...');
  for (const [key, b64str] of Object.entries(FONT_B64)) {
    try {
      const buf = b64ToArrayBuffer(b64str);
      fonts[key] = opentype.parse(buf);
    } catch (e) {
      console.warn('Font "' + key + '" parse error:', e.message);
    }
  }
  const sel = document.getElementById('inFont');
  for (const opt of sel.options) {
    if (!fonts[opt.value]) { opt.disabled = true; opt.textContent += ' (error)'; }
  }
  if (!fonts[sel.value]) {
    const avail = Object.keys(fonts);
    if (avail.length) sel.value = avail[0];
    else { showToast('Error: ninguna fuente cargada'); return; }
  }
  hideToast();
}

function initScene() {
  const ct = vp();
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0f);
  camera = new THREE.PerspectiveCamera(38, ct.clientWidth / ct.clientHeight, 0.5, 5000);
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(ct.clientWidth, ct.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  ct.insertBefore(renderer.domElement, ct.firstChild);

  scene.add(new THREE.AmbientLight(0x3a3a55, 0.45));
  var keyL = new THREE.DirectionalLight(0xfff5e6, 0.85);
  keyL.position.set(120, 200, 160);
  keyL.castShadow = true;
  keyL.shadow.mapSize.set(1024, 1024);
  var sc = keyL.shadow.camera;
  sc.near=1; sc.far=600; sc.left=-250; sc.right=250; sc.top=250; sc.bottom=-250;
  scene.add(keyL);
  var fill = new THREE.DirectionalLight(0x6688cc, 0.3);
  fill.position.set(-100, 60, -80); scene.add(fill);
  var rim = new THREE.DirectionalLight(0xff7744, 0.18);
  rim.position.set(0, -40, -120); scene.add(rim);

  var ground = new THREE.Mesh(new THREE.PlaneGeometry(800,800), new THREE.ShadowMaterial({opacity:0.2}));
  ground.rotation.x = -Math.PI/2; ground.position.y = -120; ground.receiveShadow = true;
  scene.add(ground);
  var grid = new THREE.GridHelper(400, 40, 0x1a1a2e, 0x12121e);
  grid.position.y = -120; scene.add(grid);

  window.addEventListener('resize', function() {
    var c = vp();
    camera.aspect = c.clientWidth / c.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(c.clientWidth, c.clientHeight);
  });
}

function initControls() {
  var cv = renderer.domElement;
  cv.addEventListener('pointerdown', function(e) {
    dragging = true; shiftHeld = e.shiftKey;
    prevPtr = { x: e.clientX, y: e.clientY };
    cv.setPointerCapture(e.pointerId);
  });
  cv.addEventListener('pointermove', function(e) {
    if (!dragging) return;
    var dx = e.clientX - prevPtr.x, dy = e.clientY - prevPtr.y;
    if (shiftHeld || e.buttons === 4) {
      var r = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld, 0);
      var u = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld, 1);
      panOff.addScaledVector(r, -dx * 0.35);
      panOff.addScaledVector(u, dy * 0.35);
    } else {
      orbitTheta -= dx * 0.007;
      orbitPhi = Math.max(0.05, Math.min(Math.PI - 0.05, orbitPhi + dy * 0.007));
    }
    prevPtr = { x: e.clientX, y: e.clientY };
  });
  cv.addEventListener('pointerup', function(e) { dragging = false; cv.releasePointerCapture(e.pointerId); });
  cv.addEventListener('wheel', function(e) {
    e.preventDefault();
    orbitDist = Math.max(40, Math.min(1200, orbitDist + e.deltaY * 0.35));
  }, { passive: false });
  cv.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      pinchDist = Math.hypot(dx, dy);
    }
  });
  cv.addEventListener('touchmove', function(e) {
    if (e.touches.length === 2) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      var d = Math.hypot(dx, dy);
      orbitDist = Math.max(40, Math.min(1200, orbitDist - (d - pinchDist) * 0.6));
      pinchDist = d;
    }
  });
  window.addEventListener('keydown', function(e) { if (e.key === 'Shift') shiftHeld = true; });
  window.addEventListener('keyup', function(e) { if (e.key === 'Shift') shiftHeld = false; });
}

function animate() {
  requestAnimationFrame(animate);
  camera.position.set(
    panOff.x + orbitDist * Math.sin(orbitPhi) * Math.sin(orbitTheta),
    panOff.y + orbitDist * Math.cos(orbitPhi),
    panOff.z + orbitDist * Math.sin(orbitPhi) * Math.cos(orbitTheta)
  );
  camera.lookAt(panOff);
  renderer.render(scene, camera);
}

function otPathToShapes(otPath) {
  var sp = new THREE.ShapePath();
  var startPt = null;
  for (var ci = 0; ci < otPath.commands.length; ci++) {
    var cmd = otPath.commands[ci];
    switch (cmd.type) {
      case 'M': startPt = { x: cmd.x, y: cmd.y }; sp.moveTo(cmd.x, cmd.y); break;
      case 'L': sp.lineTo(cmd.x, cmd.y); break;
      case 'Q': sp.quadraticCurveTo(cmd.x1, cmd.y1, cmd.x, cmd.y); break;
      case 'C': sp.bezierCurveTo(cmd.x1, cmd.y1, cmd.x2, cmd.y2, cmd.x, cmd.y); break;
      case 'Z': if (startPt) sp.lineTo(startPt.x, startPt.y); break;
    }
  }
  return sp.toShapes(true);
}

function getNumber(id, fallback) {
  var v = +document.getElementById(id).value;
  return isNaN(v) ? fallback : v;
}

function readConfig() {
  return {
    targetWidth: getNumber('inWidth', 100),
    depthA:      getNumber('inDepthA', 3),
    depthB:      getNumber('inDepthB', 1),
    engaste:     getNumber('inEngaste', 30) / 100,
    nameRatio:   getNumber('inNameRatio', 80) / 100,
    yMode:       document.getElementById('inYMode').value,
    colA:        document.getElementById('inColA').value,
    colB:        document.getElementById('inColB').value,
  };
}

function generate() {
  var raw = document.getElementById('inName').value.trim();
  if (!raw) return;
  var font = fonts[document.getElementById('inFont').value];
  if (!font) { showToast('Fuente no disponible'); return; }
  var cfg = readConfig();

  if (groupAll) {
    scene.remove(groupAll);
    groupAll.traverse(function(c) { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
  }
  meshA = null; meshB = null;
  groupAll = new THREE.Group();

  var initial  = raw.charAt(0).toUpperCase();
  var fullName = raw.charAt(0).toUpperCase() + raw.slice(1);

  // Scale font to target width
  var probeSize = 100;
  var probeBB = font.getPath(initial, 0, 0, probeSize).getBoundingBox();
  var probeW = probeBB.x2 - probeBB.x1;
  if (probeW < 0.01) { showToast('Sin geometria'); return; }
  var initFontSize = probeSize * (cfg.targetWidth / probeW);

  // Piece A: initial
  var initPath = font.getPath(initial, 0, 0, initFontSize);
  var initBB = initPath.getBoundingBox();
  var initShapes = otPathToShapes(initPath);
  if (!initShapes.length) { showToast('Sin formas para la inicial'); return; }

  var bvlA = Math.min(1.5, cfg.depthA * 0.15);
  var geomA = new THREE.ExtrudeGeometry(initShapes, {
    depth: cfg.depthA, bevelEnabled: true,
    bevelThickness: bvlA, bevelSize: bvlA * 0.9, bevelSegments: 3,
  });
  meshA = new THREE.Mesh(geomA, new THREE.MeshStandardMaterial({
    color: new THREE.Color(cfg.colA), roughness: 0.35, metalness: 0.12,
  }));
  meshA.castShadow = true;

  // Piece B: full name
  var nameFontSize = initFontSize * cfg.nameRatio;
  var namePath = font.getPath(fullName, 0, 0, nameFontSize);
  var nameBB = namePath.getBoundingBox();
  var nameShapes = otPathToShapes(namePath);
  if (!nameShapes.length) { showToast('Sin formas para el nombre'); return; }

  var bvlB = Math.min(1.0, cfg.depthB * 0.15);
  var geomB = new THREE.ExtrudeGeometry(nameShapes, {
    depth: cfg.depthB, bevelEnabled: true,
    bevelThickness: bvlB, bevelSize: bvlB * 0.8, bevelSegments: 2,
  });
  meshB = new THREE.Mesh(geomB, new THREE.MeshStandardMaterial({
    color: new THREE.Color(cfg.colB), roughness: 0.25, metalness: 0.18,
  }));
  meshB.castShadow = true;

  // Position
  meshA.position.set(0, 0, 0);
  var iCX = (initBB.x1 + initBB.x2) / 2;
  var iCY = (initBB.y1 + initBB.y2) / 2;
  var iY3 = initBB.y1 + (initBB.y2 - initBB.y1) / 3;
  var nCX = (nameBB.x1 + nameBB.x2) / 2;
  var nCY = (nameBB.y1 + nameBB.y2) / 2;
  var targetY = cfg.yMode === 'centroid' ? iCY : iY3;

  meshB.position.set(
    iCX - nCX,
    targetY - nCY,
    -(1 - cfg.engaste) * cfg.depthB
    // engaste 0 = fully on surface (name front at -depthB, fully protruding)
    // engaste 0.5 = half embedded (half in, half out)
    // engaste 1 = fully embedded (name front at z=0, flush with initial)
  );

  groupAll.add(meshA);
  groupAll.add(meshB);

  // Store for pocket generation at export time
  lastNameShapes = nameShapes;
  lastNamePos = meshB.position.clone();
  lastCfg = cfg;

  // Rotate 180° around X to convert opentype Y-down to Three.js Y-up
  // This maps (x,y,z) → (x,-y,-z): upright text, no mirroring
  groupAll.rotation.x = Math.PI;

  var box = new THREE.Box3().setFromObject(groupAll);
  var center = box.getCenter(new THREE.Vector3());
  groupAll.position.sub(center);
  scene.add(groupAll);

  panOff.set(0, 0, 0);
  var sz = box.getSize(new THREE.Vector3());
  orbitDist = Math.max(sz.x, sz.y, sz.z) * 1.6;

  document.getElementById('dims').innerHTML =
    '<b>' + sz.x.toFixed(0) + '</b> &#215; <b>' + sz.y.toFixed(0) + '</b> &#215; <b>' + sz.z.toFixed(0) + '</b> mm';
  document.getElementById('btnExport').disabled = false;
  showToast('\u2713 Generado'); setTimeout(hideToast, 1000);
}

function meshToSTL(mesh) {
  mesh.updateMatrixWorld(true);
  var geom = mesh.geometry, pos = geom.attributes.position, idx = geom.index, m4 = mesh.matrixWorld;
  var triCount = idx ? idx.count / 3 : pos.count / 3;
  var buf = new ArrayBuffer(84 + triCount * 50);
  var dv = new DataView(buf);
  var hdr = 'nameplate3d';
  for (var i = 0; i < 80; i++) dv.setUint8(i, i < hdr.length ? hdr.charCodeAt(i) : 0);
  dv.setUint32(80, triCount, true);

  var va = new THREE.Vector3(), vb = new THREE.Vector3(), vc = new THREE.Vector3();
  var ab = new THREE.Vector3(), ac = new THREE.Vector3(), n = new THREE.Vector3();
  var off = 84;
  var cnt = idx ? idx.count : pos.count;
  for (var i = 0; i < cnt; i += 3) {
    var i0 = idx ? idx.getX(i) : i, i1 = idx ? idx.getX(i+1) : i+1, i2 = idx ? idx.getX(i+2) : i+2;
    va.set(pos.getX(i0), pos.getY(i0), pos.getZ(i0)).applyMatrix4(m4);
    vb.set(pos.getX(i1), pos.getY(i1), pos.getZ(i1)).applyMatrix4(m4);
    vc.set(pos.getX(i2), pos.getY(i2), pos.getZ(i2)).applyMatrix4(m4);
    ab.subVectors(vb, va); ac.subVectors(vc, va); n.crossVectors(ab, ac).normalize();
    dv.setFloat32(off, n.x, true); off += 4;
    dv.setFloat32(off, n.y, true); off += 4;
    dv.setFloat32(off, n.z, true); off += 4;
    var verts = [va, vb, vc];
    for (var vi = 0; vi < 3; vi++) {
      dv.setFloat32(off, verts[vi].x, true); off += 4;
      dv.setFloat32(off, verts[vi].y, true); off += 4;
      dv.setFloat32(off, verts[vi].z, true); off += 4;
    }
    dv.setUint16(off, 0, true); off += 2;
  }
  return buf;
}

// Convert a pre-transformed BufferGeometry (no matrix needed) to STL
function geomToSTL(geom) {
  var pos = geom.attributes.position;
  var idx = geom.index;
  var triCount = idx ? idx.count / 3 : pos.count / 3;
  var buf = new ArrayBuffer(84 + triCount * 50);
  var dv = new DataView(buf);
  var hdr = 'nameplate3d';
  for (var i = 0; i < 80; i++) dv.setUint8(i, i < hdr.length ? hdr.charCodeAt(i) : 0);
  dv.setUint32(80, triCount, true);
  var va = new THREE.Vector3(), vb = new THREE.Vector3(), vc = new THREE.Vector3();
  var ab = new THREE.Vector3(), ac = new THREE.Vector3(), n = new THREE.Vector3();
  var off = 84, cnt = idx ? idx.count : pos.count;
  for (var i = 0; i < cnt; i += 3) {
    var i0 = idx ? idx.getX(i) : i, i1 = idx ? idx.getX(i+1) : i+1, i2 = idx ? idx.getX(i+2) : i+2;
    va.set(pos.getX(i0), pos.getY(i0), pos.getZ(i0));
    vb.set(pos.getX(i1), pos.getY(i1), pos.getZ(i1));
    vc.set(pos.getX(i2), pos.getY(i2), pos.getZ(i2));
    ab.subVectors(vb, va); ac.subVectors(vc, va); n.crossVectors(ab, ac).normalize();
    dv.setFloat32(off, n.x, true); off += 4;
    dv.setFloat32(off, n.y, true); off += 4;
    dv.setFloat32(off, n.z, true); off += 4;
    var verts = [va, vb, vc];
    for (var vi = 0; vi < 3; vi++) {
      dv.setFloat32(off, verts[vi].x, true); off += 4;
      dv.setFloat32(off, verts[vi].y, true); off += 4;
      dv.setFloat32(off, verts[vi].z, true); off += 4;
    }
    dv.setUint16(off, 0, true); off += 2;
  }
  return buf;
}



function download(buffer, filename) {
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([buffer], {type:'application/octet-stream'}));
  a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

// Minimal ZIP builder (no compression, store only — STL is binary, not much to gain)
function buildZip(files) {
  // files: [{name: string, data: ArrayBuffer}, ...]
  var localHeaders = [];
  var centralEntries = [];
  var offset = 0;

  for (var i = 0; i < files.length; i++) {
    var name = files[i].name;
    var data = new Uint8Array(files[i].data);
    var nameBytes = new TextEncoder().encode(name);

    // Local file header (30 + name + data)
    var local = new ArrayBuffer(30 + nameBytes.length + data.length);
    var lv = new DataView(local);
    lv.setUint32(0, 0x04034b50, true);  // signature
    lv.setUint16(4, 20, true);           // version needed
    lv.setUint16(6, 0, true);            // flags
    lv.setUint16(8, 0, true);            // compression: store
    lv.setUint16(10, 0, true);           // mod time
    lv.setUint16(12, 0, true);           // mod date
    lv.setUint32(14, crc32(data), true); // crc32
    lv.setUint32(18, data.length, true); // compressed size
    lv.setUint32(22, data.length, true); // uncompressed size
    lv.setUint16(26, nameBytes.length, true); // name length
    lv.setUint16(28, 0, true);           // extra length
    new Uint8Array(local, 30).set(nameBytes);
    new Uint8Array(local, 30 + nameBytes.length).set(data);
    localHeaders.push(local);

    // Central directory entry (46 + name)
    var central = new ArrayBuffer(46 + nameBytes.length);
    var cv = new DataView(central);
    cv.setUint32(0, 0x02014b50, true);   // signature
    cv.setUint16(4, 20, true);            // version made by
    cv.setUint16(6, 20, true);            // version needed
    cv.setUint16(8, 0, true);             // flags
    cv.setUint16(10, 0, true);            // compression
    cv.setUint16(12, 0, true);            // mod time
    cv.setUint16(14, 0, true);            // mod date
    cv.setUint32(16, crc32(data), true);  // crc32
    cv.setUint32(20, data.length, true);  // compressed
    cv.setUint32(24, data.length, true);  // uncompressed
    cv.setUint16(28, nameBytes.length, true); // name len
    cv.setUint16(30, 0, true);            // extra len
    cv.setUint16(32, 0, true);            // comment len
    cv.setUint16(34, 0, true);            // disk start
    cv.setUint16(36, 0, true);            // internal attrs
    cv.setUint32(38, 0, true);            // external attrs
    cv.setUint32(42, offset, true);       // local header offset
    new Uint8Array(central, 46).set(nameBytes);
    centralEntries.push(central);

    offset += local.byteLength;
  }

  var centralSize = centralEntries.reduce(function(s,e){return s+e.byteLength}, 0);
  var eocd = new ArrayBuffer(22);
  var ev = new DataView(eocd);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(4, 0, true);
  ev.setUint16(6, 0, true);
  ev.setUint16(8, files.length, true);
  ev.setUint16(10, files.length, true);
  ev.setUint32(12, centralSize, true);
  ev.setUint32(16, offset, true);
  ev.setUint16(20, 0, true);

  var parts = localHeaders.concat(centralEntries, [eocd]);
  var total = parts.reduce(function(s,p){return s+p.byteLength}, 0);
  var zip = new Uint8Array(total);
  var pos = 0;
  for (var j = 0; j < parts.length; j++) {
    zip.set(new Uint8Array(parts[j]), pos);
    pos += parts[j].byteLength;
  }
  return zip.buffer;
}

// CRC32 (standard polynomial)
function crc32(data) {
  var table = crc32.table;
  if (!table) {
    table = crc32.table = new Uint32Array(256);
    for (var i = 0; i < 256; i++) {
      var c = i;
      for (var j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
      table[i] = c;
    }
  }
  var crc = 0xFFFFFFFF;
  for (var k = 0; k < data.length; k++) crc = table[(crc ^ data[k]) & 0xFF] ^ (crc >>> 8);
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

function exportSTL() {
  if (!meshA || !meshB) return;
  groupAll.updateMatrixWorld(true);
  var slug = (document.getElementById('inName').value.trim() || 'np').toLowerCase().replace(/\s+/g, '_');

  var stlA = meshToSTL(meshA);
  var stlB = meshToSTL(meshB);

  var readme = new TextEncoder().encode(
    slug.toUpperCase() + ' NAMEPLATE\n' +
    '==============================\n\n' +
    '  ' + slug + '_inicial.stl  -> Filamento 1 (letra grande)\n' +
    '  ' + slug + '_nombre.stl   -> Filamento 2 (nombre engastado)\n\n' +
    'BAMBU STUDIO (multicolor con engaste):\n' +
    '  1. Importar ambos STL como objetos separados\n' +
    '  2. Click derecho en _inicial > Add Negative Part > _nombre.stl\n' +
    '     (el nombre sirve como volumen negativo directamente)\n' +
    '  3. Asignar filamentos distintos a inicial y nombre\n' +
    '  4. Las coordenadas ya estan alineadas, no mover nada\n'
  );

  var zip = buildZip([
    { name: slug + '_inicial.stl', data: stlA },
    { name: slug + '_nombre.stl',  data: stlB },
    { name: 'LEEME.txt',           data: readme.buffer },
  ]);

  download(zip, slug + '_nameplate.zip');
  showToast('\u2713 ZIP: 2 STL + instrucciones'); setTimeout(hideToast, 2000);
}

function bindUI() {
  var sliders = [
    ['inEngaste','valEngaste',function(v){return v+'%'}],
    ['inWidth','valWidth',function(v){return v}],
    ['inDepthA','valDepthA',function(v){return v}],
    ['inDepthB','valDepthB',function(v){return v}],
    ['inNameRatio','valNameRatio',function(v){return (v/100).toFixed(2)}],
  ];
  for (var si = 0; si < sliders.length; si++) {
    (function(sid, vid, fmt) {
      document.getElementById(sid).addEventListener('input', function() {
        document.getElementById(vid).textContent = fmt(this.value);
      });
    })(sliders[si][0], sliders[si][1], sliders[si][2]);
  }
  document.getElementById('inName').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') generate();
  });
}

function toggleAdvanced() {
  document.getElementById('advPanel').classList.toggle('open');
  document.getElementById('btnAdv').classList.toggle('active');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
}
function hideToast() { document.getElementById('toast').classList.remove('show'); }
